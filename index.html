<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ════════════════ 배포 설정 (여기만 채우면 됩니다) ════════════════
   1) Apps Script 웹앱 배포 후 받은 URL을 API 에 붙여넣기
   2) Code.gs 에서 토큰을 켰다면 같은 값을 TOKEN 에 입력 (안 켰으면 빈칸)        */
const CONFIG = {
  API: "https://script.google.com/macros/s/AKfycbwAs6_nHkqs9aRLG4C63sr3-J_WeMGmUFv11K84tooThHbfob_8SCxaxNVTohBIjRE/exec",      // 예: "https://script.google.com/macros/s/AKfy.../exec"
  TOKEN: "",    // 예: "galdam2026"  (Code.gs 와 동일하게)
};

/* ════════════════ 디자인 토큰 ════════════════ */
const C = {
  paper: "#F4F2EB", card: "#FFFFFF", ink: "#221F18", sub: "#736E62",
  brand: "#2E6F5E", brandDk: "#225447", brandSoft: "#E2EFE9",
  gold: "#D7972B", goldDk: "#B57C1C", goldSoft: "#F8EFD9",
  ok: "#2E9E5B", okSoft: "#E5F4EB", no: "#CF5A4F", noSoft: "#FBEAE6",
  blue: "#3F6BD6", purple: "#6A4FA3", brown: "#9A6B3F", stone: "#8A8276", rose: "#B5567E",
  line: "#E7E2D5", track: "#ECE8DD", key: "#FBFAF5", keyLine: "#E2DCCD",
};
const FONT = '"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif';
const km = (n) => Math.round(n || 0).toLocaleString("ko-KR");

/* ════════════════ 수학 헬퍼 & 단계 엔진 ════════════════ */
const gcd = (a, b) => { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a || 1; };
const lcm = (a, b) => (a / gcd(a, b)) * b;
const reduce = (n, d) => { const s = d < 0 ? -1 : 1; n *= s; d *= s; const g = gcd(n, d) || 1; return { n: n / g, d: d / g }; };
const ri = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const pick = (a) => a[Math.floor(Math.random() * a.length)];
const r1 = (x) => Math.round(x * 10) / 10;
const N = (v) => ({ t: "num", v }), OP = (v) => ({ t: "op", v }), FR = (n, d) => ({ t: "frac", n, d }), TX = (v) => ({ t: "txt", v });

/* ════ 생성기 부품(factory) — 자료 목록을 잘게 분화하는 재료 ════ */
const r2 = (x) => Math.round(x * 100) / 100;
const U = () => ri(1, 9), TEN = () => ri(1, 9) * 10, TU = () => ri(11, 99), H = () => ri(1, 9) * 100, HTU = () => ri(100, 999), K4 = () => ri(1000, 9999);
const add = (A, B) => () => { const a = A(), b = B(); return { tokens: [N(a), OP("+"), N(b)], kind: "int", ans: a + b }; };
const sub = (A, B) => () => { let a = A(), b = B(); if (a < b)[a, b] = [b, a]; return { tokens: [N(a), OP("−"), N(b)], kind: "int", ans: a - b }; };
const mul = (A, B) => () => { const a = A(), b = B(); return { tokens: [N(a), OP("×"), N(b)], kind: "int", ans: a * b }; };
const add24 = () => { const a = ri(10, 17), b = ri(2, 9); return { tokens: [N(a), OP("+"), N(b)], kind: "int", ans: a + b }; };
const sub24 = () => { const a = ri(11, 24), b = ri(2, 9); return { tokens: [N(a), OP("−"), N(b)], kind: "int", ans: a - b }; };
const gather = () => { const a = ri(1, 8), b = ri(1, 9 - a); return { tokens: [N(a), TX("와"), N(b), TX("모으기")], kind: "int", ans: a + b }; };
const split = () => { const n = ri(4, 9), a = ri(1, n - 1); return { tokens: [N(n), TX("="), N(a), OP("+"), TX("?")], kind: "int", ans: n - a }; };
const compl10 = () => { const a = ri(1, 9); return { tokens: [N(a), OP("+"), TX("?"), OP("="), N(10)], kind: "int", ans: 10 - a }; };
const blank = () => { const a = ri(2, 9), c = ri(a + 2, 18); return { tokens: [N(a), OP("+"), TX("□"), OP("="), N(c)], kind: "int", ans: c - a }; };
const three = (ops) => () => { const f = () => { const a = ri(3, 9), b = ri(2, 9), c = ri(2, 9); let v = a, t = [N(a)];[b, c].forEach((x, i) => { const op = ops[i]; t.push(OP(op), N(x)); v = op === "+" ? v + x : v - x; }); return { v, t }; }; let r = f(), g = 0; while (r.v < 0 && g++ < 20) r = f(); return { tokens: r.t, kind: "int", ans: r.v }; };
const times = (dans) => () => { const a = pick(dans), b = ri(2, 9); return Math.random() < .5 ? { tokens: [N(a), OP("×"), N(b)], kind: "int", ans: a * b } : { tokens: [N(b), OP("×"), N(a)], kind: "int", ans: a * b }; };
const divExact = (qmax, dmax) => () => { const d = ri(2, dmax), q = ri(2, qmax); return { tokens: [N(d * q), OP("÷"), N(d)], kind: "int", ans: q }; };
const divTens = () => { const d = ri(2, 9) * 10, q = ri(2, 9); return { tokens: [N(d * q), OP("÷"), N(d)], kind: "int", ans: q }; };
const divTwo = () => { const d = ri(11, 40), q = ri(2, 9); return { tokens: [N(d * q), OP("÷"), N(d)], kind: "int", ans: q }; };
const divRem = (dmax, qmax) => () => { const d = ri(3, dmax), q = ri(2, qmax), r = ri(1, d - 1); return { tokens: [N(d * q + r), OP("÷"), N(d)], kind: "qr", ans: { q, r } }; };
const divCheck = () => { const d = ri(2, 9), q = ri(2, 12), r = ri(0, d - 1); return { tokens: [N(d), OP("×"), N(q), OP("+"), N(r)], kind: "int", ans: d * q + r }; };
const fAdd = () => { const d = ri(3, 9), a = ri(1, d - 1), b = ri(1, d - 1); return { tokens: [FR(a, d), OP("+"), FR(b, d)], kind: "frac", ans: reduce(a + b, d) }; };
const fSub = () => { const d = ri(4, 9), a = ri(2, d - 1), b = ri(1, a - 1); return { tokens: [FR(a, d), OP("−"), FR(b, d)], kind: "frac", ans: reduce(a - b, d) }; };
const mixAddSame = () => { const d = ri(3, 9), w1 = ri(1, 4), w2 = ri(1, 4), a = ri(1, d - 1), b = ri(1, d - 1); return { tokens: [N(w1), FR(a, d), OP("+"), N(w2), FR(b, d)], kind: "mixed", ans: reduce((w1 * d + a) + (w2 * d + b), d) }; };
const mixSubSame = () => { const d = ri(3, 9), w1 = ri(3, 6), w2 = ri(1, 2), a = ri(1, d - 1), b = ri(1, d - 1); return { tokens: [N(w1), FR(a, d), OP("−"), N(w2), FR(b, d)], kind: "mixed", ans: reduce((w1 * d + a) - (w2 * d + b), d) }; };
const impToMixed = () => { const d = ri(2, 9), w = ri(1, 4), a = ri(1, d - 1), n = w * d + a; return { tokens: [FR(n, d), TX("→ 대분수")], kind: "mixed", ans: reduce(n, d) }; };
const mixedToImp = () => { const d = ri(2, 9), w = ri(1, 4), a = ri(1, d - 1); return { tokens: [N(w), FR(a, d), TX("→ 가분수")], kind: "frac", ans: reduce(w * d + a, d) }; };
const reduceF = () => { const g = ri(2, 6), n0 = ri(1, 5), d0 = ri(n0 + 1, 8); return { tokens: [FR(n0 * g, d0 * g), TX("→ 기약분수")], kind: "frac", ans: reduce(n0 * g, d0 * g) }; };
const commonDen = () => { let a, b; do { a = ri(2, 9); b = ri(2, 9); } while (a === b); return { tokens: [FR(1, a), TX("와"), FR(1, b), TX("의 공통분모")], kind: "int", ans: lcm(a, b) }; };
const fMulNat = () => { const d = ri(3, 9), n = ri(1, d - 1), k = ri(2, 8); return { tokens: [FR(n, d), OP("×"), N(k)], kind: "frac", ans: reduce(n * k, d) }; };
const fMulF = () => { const d1 = ri(2, 9), n1 = ri(1, d1 - 1), d2 = ri(2, 9), n2 = ri(1, d2 - 1); return { tokens: [FR(n1, d1), OP("×"), FR(n2, d2)], kind: "frac", ans: reduce(n1 * n2, d1 * d2) }; };
const fToDec = () => { const t = pick([[1, 2, 0.5], [1, 4, 0.25], [3, 4, 0.75], [1, 5, 0.2], [2, 5, 0.4], [1, 10, 0.1], [3, 10, 0.3]]); return { tokens: [FR(t[0], t[1]), TX("→ 소수")], kind: "dec", ans: t[2] }; };
const decAddSame = () => { const a = ri(11, 89) / 10, b = ri(11, 89) / 10; return { tokens: [N(a), OP("+"), N(b)], kind: "dec", ans: r2(a + b) }; };
const decAddDiff = () => { const a = ri(11, 89) / 10, b = ri(101, 899) / 100; return { tokens: [N(a), OP("+"), N(b)], kind: "dec", ans: r2(a + b) }; };
const decSubSame = () => { let a = ri(30, 98) / 10, b = ri(11, a * 10 - 1) / 10; return { tokens: [N(a), OP("−"), N(b)], kind: "dec", ans: r2(a - b) }; };
const decSubDiff = () => { let a = ri(40, 98) / 10, b = ri(101, a * 100 - 1) / 100; return { tokens: [N(a), OP("−"), N(b)], kind: "dec", ans: r2(a - b) }; };
const decMulNat = () => { const a = ri(11, 89) / 10, k = ri(2, 9); return { tokens: [N(a), OP("×"), N(k)], kind: "dec", ans: r2(a * k) }; };
const decMul = () => { const a = ri(11, 29) / 10, b = ri(11, 29) / 10; return { tokens: [N(a), OP("×"), N(b)], kind: "dec", ans: r2(a * b) }; };
const mixCalc = (kind) => () => {
  const F = {
    "+−": () => { const a = ri(10, 40), b = ri(2, 15), c = ri(2, 15); return { t: [N(a), OP("+"), N(b), OP("−"), N(c)], v: a + b - c }; },
    "×÷": () => { const b = ri(2, 9), q = ri(2, 9), c = ri(2, 9); return { t: [N(b * q), OP("÷"), N(b), OP("×"), N(c)], v: q * c }; },
    "+−×": () => { const a = ri(2, 9), b = ri(2, 9), c = ri(2, 30); return { t: [N(c), OP("+"), N(a), OP("×"), N(b)], v: c + a * b }; },
    "+−÷": () => { const b = ri(2, 9), q = ri(2, 9), c = ri(2, 30); return { t: [N(b * q), OP("÷"), N(b), OP("+"), N(c)], v: q + c }; },
    "all": () => { const b = ri(2, 9), q = ri(2, 9), c = ri(2, 9), e = ri(2, 20); return { t: [N(b * q), OP("÷"), N(b), OP("×"), N(c), OP("+"), N(e)], v: q * c + e }; }
  };
  const f = F[kind](); return { tokens: f.t, kind: "int", ans: f.v };
};
const gcdQ = () => { const m = ri(2, 9), p = ri(2, 7), q = ri(2, 7); return { tokens: [N(m * p), TX("와"), N(m * q), TX("의 최대공약수")], kind: "int", ans: gcd(m * p, m * q) }; };
const lcmQ = () => { const a = ri(3, 12), b = ri(3, 12); return { tokens: [N(a), TX("와"), N(b), TX("의 최소공배수")], kind: "int", ans: lcm(a, b) }; };

/* ════ 카탈로그: 수학기초연산 자료 목록 → 단계 (g = 학년 월드) ════ */
const CATALOG = [
  ["g_gather", 1, "두 수 모으기", gather], ["g_split", 1, "두 수 가르기", split], ["g_c10", 1, "10이 되는 덧셈(보수)", compl10],
  ["g_add1", 1, "한 자리 + 한 자리", add(U, U)], ["g_sub1", 1, "한 자리 − 한 자리", sub(U, U)],
  ["g_add24", 1, "(두 자리)+(한 자리)", add24], ["g_sub24", 1, "(두 자리)−(한 자리)", sub24],
  ["g_3add", 1, "세 수의 덧셈", three(["+", "+"])], ["g_3addsub", 1, "세 수의 덧셈·뺄셈", three(["+", "−"])],
  ["t_t1", 2, "(몇십)+(몇)", add(TEN, U)], ["t_tt", 2, "(몇십)+(몇십)", add(TEN, TEN)], ["t_tutu_a", 2, "(몇십몇)+(몇십몇)", add(TU, TU)],
  ["t_tt_s", 2, "(몇십)−(몇십)", sub(TEN, TEN)], ["t_tu_u", 2, "(몇십몇)−(몇)", sub(TU, U)], ["t_tutu_s", 2, "(몇십몇)−(몇십몇)", sub(TU, TU)],
  ["t_blank", 2, "□의 값 구하기", blank],
  ["t_g2534", 2, "곱셈구구 2·5·3·4단", times([2, 5, 3, 4])], ["t_g6789", 2, "곱셈구구 6·7·8·9단", times([6, 7, 8, 9])], ["t_gall", 2, "구구단 종합", times([2, 3, 4, 5, 6, 7, 8, 9])],
  ["h_hhh_a", 3, "(세 자리)+(세 자리)", add(HTU, HTU)], ["h_hhh_s", 3, "(세 자리)−(세 자리)", sub(HTU, HTU)], ["h_k_s", 3, "(네 자리)−(세 자리)", sub(K4, HTU)],
  ["h_divsame", 3, "똑같이 나누기", divExact(9, 9)], ["h_gugudiv", 3, "곱셈구구와 나눗셈", divExact(9, 9)],
  ["h_t_u", 3, "(몇십)×(몇)", mul(TEN, U)], ["h_tu_u", 3, "(두 자리)×(한 자리)", mul(TU, U)], ["h_h_u", 3, "(세 자리)×(한 자리)", mul(HTU, U)],
  ["h_t_t", 3, "(몇십)×(몇십)", mul(TEN, TEN)], ["h_tu_t", 3, "(두 자리)×(몇십)", mul(TU, TEN)], ["h_tu_tu", 3, "(두 자리)×(두 자리)", mul(TU, TU)],
  ["h_t_div", 3, "(몇십)÷(몇)", divExact(9, 9)], ["h_rem", 3, "나머지가 있는 나눗셈", divRem(9, 19)], ["h_check", 3, "나눗셈의 검산", divCheck], ["h_tu_div", 3, "(몇십몇)÷(몇)", divExact(12, 9)],
  ["f_divtens", 4, "몇십으로 나누기", divTens], ["f_tu_div", 4, "(두 자리)÷(두 자리)", divTwo], ["f_h_div", 4, "(세 자리)÷(두 자리)", divTwo],
  ["f_imp2mix", 4, "가분수 → 대분수", impToMixed], ["f_mix2imp", 4, "대분수 → 가분수", mixedToImp],
  ["f_padd", 4, "분모 같은 진분수 덧셈", fAdd], ["f_madd", 4, "분모 같은 대분수 덧셈", mixAddSame],
  ["f_psub", 4, "분모 같은 진분수 뺄셈", fSub], ["f_msub", 4, "분모 같은 대분수 뺄셈", mixSubSame],
  ["f_dadd_s", 4, "자릿수 같은 소수 덧셈", decAddSame], ["f_dadd_d", 4, "자릿수 다른 소수 덧셈", decAddDiff],
  ["f_dsub_s", 4, "자릿수 같은 소수 뺄셈", decSubSame], ["f_dsub_d", 4, "자릿수 다른 소수 뺄셈", decSubDiff],
  ["v_mix1", 5, "덧셈과 뺄셈의 혼합", mixCalc("+−")], ["v_mix2", 5, "곱셈과 나눗셈의 혼합", mixCalc("×÷")],
  ["v_mix3", 5, "덧·뺄·곱 혼합", mixCalc("+−×")], ["v_mix4", 5, "덧·뺄·나 혼합", mixCalc("+−÷")], ["v_mix5", 5, "사칙 혼합", mixCalc("all")],
  ["v_gcd", 5, "약수와 배수(최대공약수)", gcdQ], ["v_lcm", 5, "약수와 배수(최소공배수)", lcmQ],
  ["v_reduce", 5, "약분", reduceF], ["v_common", 5, "통분(공통분모)", commonDen], ["v_f2d", 5, "분수와 소수", fToDec],
  ["v_fmuln", 5, "분수 × 자연수", fMulNat], ["v_fmulf", 5, "분수의 곱셈", fMulF],
  ["v_dmuln", 5, "소수와 자연수의 곱셈", decMulNat], ["v_dmul", 5, "소수의 곱셈", decMul],
];
const STAGES = CATALOG.map(([id, g, name, make]) => ({ id, g, name, make }));
const ROUND = 10;
const fmtTime = (s) => `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, "0")}`;

/* ════════════════ 달무티 13계급 ════════════════ */
const DAL = ["달무티", "대주교", "시종장", "남작 부인", "백작", "기사", "재봉사", "석공", "요리사", "양치기", "광부", "농노", "어릿광대"];
function crest(title) {
  const i = DAL.indexOf(title);
  if (i === 0) return { bg: `linear-gradient(135deg,${C.gold},${C.goldDk})`, fg: "#fff", tier: "최고 귀족", crown: true };
  if (i <= 4) return { bg: C.purple, fg: "#fff", tier: "귀족", crown: false };
  if (i <= 6) return { bg: C.brand, fg: "#fff", tier: "기사·장인", crown: false };
  if (i <= 10) return { bg: C.brown, fg: "#fff", tier: "장인·노동", crown: false };
  if (i === 11) return { bg: C.stone, fg: "#fff", tier: "농노", crown: false };
  return { bg: C.rose, fg: "#fff", tier: "어릿광대 · 반전의 카드", crown: false };
}

/* ════════════════ 듀오링고식 잠금 해제 + 왕관(메달) ════════════════ */
const CLEAR_PCT = 80; // 정확도 80% 이상이면 단계 완료 → 다음 단계 잠금 해제
const MEDALS = { gold: { name: "골드", c: "#E3B23C" }, silver: { name: "실버", c: "#A9B2BD" }, bronze: { name: "브론즈", c: "#C77B3B" }, none: { name: "", c: C.line } };
// 속도 단계: 빠를수록 자동화 — 👑반사(≤1초) ⚡자동화(≤2초) 🌱생각(그 외)
const SPEED = { reflex: { name: "반사", emoji: "👑", xp: 3, c: C.gold }, auto: { name: "자동화", emoji: "⚡", xp: 2, c: C.ok }, think: { name: "생각", emoji: "🌱", xp: 1, c: C.blue } };
const speedTier = (sec) => sec <= 1 ? "reflex" : sec <= 2 ? "auto" : "think";
function isBlank(p, vals) { if (p.kind === "frac") return vals.n === "" && vals.d === ""; if (p.kind === "qr") return vals.q === "" && vals.r === ""; if (p.kind === "mixed") return vals.n === "" && vals.d === "" && (vals.w === "" || vals.w == null); return vals.a === ""; }

// 낮은 단계 → 높은 단계 진행 순서 (학년 오름차순, 기존 STAGES 순서 유지)
const ORDER = STAGES.map((s, i) => ({ s, i })).sort((a, b) => (a.s.g - b.s.g) || (a.i - b.i)).map((x) => x.s);

// 로컬 진행상황: 최고기록(best)만 저장, 오프라인·즉시 반영 (저장 막힌 환경 대비 메모리 폴백)

// 오늘의 미션(일일 세트) — 날짜 바뀌면 리셋, 저장 막힌 환경 대비 메모리 폴백
function todayStr() { const d = new Date(); return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`; }
let memDaily = null;

}

// 각 월드(학년)의 첫 단계는 항상 열어둠
const WORLD_FIRST = (() => { const seen = {}, set = {}; ORDER.forEach((s) => { if (!seen[s.g]) { seen[s.g] = true; set[s.id] = true; } }); return set; })();
// unlock 여부: 월드 첫 단계는 항상 열림, 그 외엔 '직전 단계 완료(80%↑)' 시 열림

function Medal({ kind, s = 18 }) { if (!kind || kind === "none") return null; const c = MEDALS[kind].c; return <svg width={s} height={s} viewBox="0 0 24 24"><path d="M7 2l2 6 3-2 3 2 2-6" stroke={c} strokeWidth="2" fill="none" /><circle cx="12" cy="15" r="6" fill={c} /><circle cx="12" cy="15" r="2.6" fill="#fff" opacity=".5" /></svg>; }

/* ════════════════ 백엔드 API + 오프라인 큐 ════════════════ */
const api = {
  on() { return !!CONFIG.API; },
  q(p) { return CONFIG.API + "?" + new URLSearchParams({ ...p, token: CONFIG.TOKEN }); },
  async getRoster() { const r = await fetch(this.q({ action: "roster" })); return (await r.json()).students; },
  async getClass() { const r = await fetch(this.q({ action: "class" })); return (await r.json()).data; },
  async getDashboard(no) { const r = await fetch(this.q({ action: "dashboard", no })); return (await r.json()).data; },
  async getProgress(no) { const r = await fetch(this.q({ action: "progress", no })); return (await r.json()).data; },
  async logSet(p) {
    if (!this.on()) return null;
    const body = JSON.stringify({ action: "log", token: CONFIG.TOKEN, ...p });
    try {
      const r = await fetch(CONFIG.API, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body });
      return (await r.json()).data;
    } catch (e) { queueLog(p); return null; }
  },
};

  let q; try { q = JSON.parse(localStorage.getItem("pendingLogs") || "[]"); } catch (e) { return; }
  if (!q.length) return;
  const rest = [];
  for (const p of q) { try { const r = await fetch(CONFIG.API, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "log", token: CONFIG.TOKEN, ...p }) }); await r.json(); } catch (e) { rest.push(p); } }
  localStorage.setItem("pendingLogs", JSON.stringify(rest));
}

const Card = ({ title, accent, children, span }) => (<section style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 18, padding: 16, boxShadow: "0 2px 10px rgba(0,0,0,.02)", gridColumn: span ? "1 / -1" : "auto" }}>{title && <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 13 }}><span style={{ width: 4, height: 15, borderRadius: 4, background: accent || C.brand }} /><h3 style={{ margin: 0, fontSize: 15, fontWeight: 800, color: C.ink }}>{title}</h3></div>}{children}</section>);

/* ════════════════ 앱 ════════════════ */
function App() {
  const [me, setMe] = useState(() => { try { return JSON.parse(localStorage.getItem("me") || "null"); } catch (e) { return null; } });
  const [tab, setTab] = useState("learn");
  const [playing, setPlaying] = useState(null);

  const [progress, setProgress] = useState(() => loadProgress());
  const [daily, setDaily] = useState(() => loadDaily());
  const refreshProgress = useCallback(async (noArg) => {
    const n = noArg != null ? noArg : (me && me.no);
    if (!api.on() || n == null) return;
    try { const remote = await api.getProgress(n); const merged = mergeProgress(loadProgress(), remote || {}); saveProgress(merged); setProgress(merged); } catch (e) {}
  }, [me]);
  useEffect(() => { flushQueue(); refreshProgress(); }, [refreshProgress]);
  const choose = (s) => { try { localStorage.setItem("me", JSON.stringify(s)); } catch (e) {} setMe(s); setTab("learn"); refreshProgress(s.no); };
  const clearMe = () => { try { localStorage.removeItem("me"); } catch (e) {} setMe(null); };

  const onFinish = async (r) => {
    const acc = Math.round(r.correct / r.total * 100);
    setProgress(applyResult(playing.id, acc)); // 최고기록·메달·잠금해제 즉시 반영
    setDaily(bumpDaily(acc)); // 오늘의 추천 진행 + 정답률 기록
    const payload = { no: me.no, name: me.name, stageId: playing.id, stageName: playing.name, correct: r.correct, total: r.total, seconds: r.seconds };
    setPlaying(null); setTab("me");
    await api.logSet(payload); // 오프라인이면 자동 큐
    refreshProgress();
  };

  if (!me) return <Shell><SelectScreen onPick={choose} /></Shell>;
  if (playing) return <Shell><Player stage={playing} onExit={() => setPlaying(null)} onDone={onFinish} /></Shell>;

  return (
    <Shell>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12, flexWrap: "wrap" }}>
        <div style={{ width: 42, height: 42, borderRadius: 12, background: C.brand, display: "grid", placeItems: "center", color: "#fff", fontSize: 20, fontWeight: 900 }}>달</div>
        <div style={{ flex: 1, minWidth: 120 }}>
          <div style={{ fontSize: 18, fontWeight: 900, color: C.ink }}>달무티 수학</div>
          <div style={{ fontSize: 12, color: C.sub, fontWeight: 600 }}>{me.no}번 {me.name}</div>
        </div>
        <button onClick={clearMe} style={{ background: "none", border: `1px solid ${C.line}`, borderRadius: 9, padding: "6px 10px", fontSize: 12.5, fontWeight: 700, color: C.sub, cursor: "pointer" }}>← 바꾸기</button>
      </div>
      <div style={{ display: "flex", background: "#fff", border: `1px solid ${C.line}`, borderRadius: 12, padding: 4, gap: 4, marginBottom: 14 }}>
        {[["learn", "학습"], ["me", "내 학습판"], ["class", "우리 반"]].map(([k, t]) => (
          <button key={k} onClick={() => setTab(k)} style={{ flex: 1, padding: "9px 0", fontSize: 14, fontWeight: 800, borderRadius: 9, cursor: "pointer", border: "none", color: tab === k ? "#fff" : C.sub, background: tab === k ? C.brand : "transparent" }}>{t}</button>))}
      </div>

      {tab === "learn" && <LearnScreen onStart={setPlaying} progress={progress} daily={daily} />}
      {tab === "me" && <MeScreen no={me.no} />}
      {tab === "class" && <ClassScreen meNo={me.no} />}

      <div style={{ textAlign: "center", marginTop: 18, fontSize: 11, color: C.line, fontWeight: 600 }}>달무티 수학 · 갈담초 5학년{api.on() ? "" : " · (백엔드 미연결 — 학습 기록은 저장만 됩니다)"}</div>
    </Shell>

/* ════════════════ 학년별 월드맵 (듀오링고식 세로 path) ════════════════ */
const WORLD_THEME = {

  if (rec.length >= 2 && avg2 < 60) return STAGES.find((s) => s.id === "g_add24") || STAGES[0]; // 많이 틀림 → 쉬운 자동화(24이하)

  else if (restful) { msg = "오늘 충분히 했어요 🌿"; sub = "잠깐 쉬어가도 좋아요. 짧고 자주가 비결이에요."; btn = "한 세트 더 (천천히)"; }

  else { msg = "오늘 5세트만 가볍게!"; sub = "덧셈·뺄셈은 구구단처럼 빨라지는 게 목표예요."; btn = "추천 세트 시작 ▶"; }

        </div>
        <span style={{ fontSize: 12.5, fontWeight: 800, color: done ? C.ok : C.sub }}>{done ? "완료 ✓" : `${cleared}/${w.stages.length}`}</span>
        <span style={{ fontSize: 15, color: C.sub, marginLeft: 4, display: "inline-block", transform: open ? "rotate(90deg)" : "none", transition: "transform .15s" }}>▸</span>
      </button>
      {open && (
        <div style={{ position: "relative", padding: "6px 0" }}>
          <div style={{ position: "absolute", left: "50%", top: 10, bottom: 10, borderLeft: `3px dashed ${C.line}`, transform: "translateX(-50%)" }} />
          <div style={{ position: "relative", display: "flex", flexDirection: "column", alignItems: "center", gap: 20 }}>
            {w.stages.map((s, j) => {
              const pr = progress[s.id];
              return <Node key={s.id} stage={s} pr={pr} unlocked={isUnlocked(s.id, progress)} cleared={!!(pr && pr.cleared)} current={s.id === currentId} color={w.c} dx={pattern[j % pattern.length]} onStart={onStart} />;
            })}
          </div>
        </div>
      )}
    </section>
  );
}

function LearnScreen({ onStart, progress, daily }) {
  const cur = ORDER.find((s) => isUnlocked(s.id, progress) && !(progress[s.id] && progress[s.id].cleared));
  const currentId = cur ? cur.id : null;
  const curWorld = cur ? cur.g : 1;
  const [openW, setOpenW] = useState(() => ({ [curWorld]: true }));
  useEffect(() => { setOpenW((o) => o[curWorld] ? o : { ...o, [curWorld]: true }); }, [curWorld]);
  const allOpen = WORLDS.every((w) => openW[w.g]);
  const setAll = (v) => setOpenW(v ? Object.fromEntries(WORLDS.map((w) => [w.g, true])) : {});
  const toggle = (g) => setOpenW((o) => ({ ...o, [g]: !o[g] }));
  return (
    <div style={{ maxWidth: 460, margin: "0 auto" }}>
      <DailyMission daily={daily} progress={progress} onStart={onStart} />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, gap: 8 }}>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
          {[["bronze", "70%"], ["silver", "85%"], ["gold", "100%"]].map(([k, v]) => (
            <span key={k} style={{ display: "inline-flex", alignItems: "center", gap: 4, fontSize: 12, fontWeight: 700, color: C.sub }}><Medal kind={k} s={16} />{MEDALS[k].name} {v}</span>))}
        </div>
        <button onClick={() => setAll(!allOpen)} style={{ background: "none", border: `1px solid ${C.line}`, borderRadius: 8, padding: "5px 10px", fontSize: 12, fontWeight: 800, color: C.sub, cursor: "pointer", whiteSpace: "nowrap" }}>{allOpen ? "모두 접기" : "모두 펼치기"}</button>
      </div>
      {WORLDS.map((w) => <World key={w.g} world={w} progress={progress} currentId={currentId} onStart={onStart} open={!!openW[w.g]} onToggle={toggle} />)}
      <div style={{ textAlign: "center", fontSize: 12, color: C.sub, fontWeight: 700, marginTop: 6 }}>각 월드 첫 단계는 열려 있어요 · 정확도 80% 이상이면 다음 단계가 열려요</div>
    </div>
  );
}

/* ─────────── 학습: 풀이 ─────────── */
function Player({ stage, onExit, onDone }) {
  const [probs] = useState(() => Array.from({ length: ROUND }, () => stage.make()));
  const [idx, setIdx] = useState(0); const [marks, setMarks] = useState([]); const [speeds, setSpeeds] = useState([]);
  const [vals, setVals] = useState({ a: "" }); const [active, setActive] = useState("a");
  const [feedback, setFeedback] = useState(null); const [elapsed, setElapsed] = useState(0);
  const [speedXP, setSpeedXP] = useState(0); const [flash, setFlash] = useState(null); const [hint, setHint] = useState(null);
  const startRef = useRef(Date.now()); const probRef = useRef(Date.now()); const lockRef = useRef(false); const tRef = useRef(null); const blankRef = useRef(0);
  const p = probs[idx];
  useEffect(() => { tRef.current = setInterval(() => setElapsed((Date.now() - startRef.current) / 1000), 100); return () => clearInterval(tRef.current); }, []);
  useEffect(() => { probRef.current = Date.now(); blankRef.current = 0; setHint(null); if (p.kind === "frac") { setVals({ n: "", d: "" }); setActive("n"); } else if (p.kind === "qr") { setVals({ q: "", r: "" }); setActive("q"); } else if (p.kind === "mixed") { setVals({ w: "", n: "", d: "" }); setActive("w"); } else { setVals({ a: "" }); setActive("a"); } }, [idx]);
  const press = (k) => { if (lockRef.current) return; setHint(null); setVals((v) => { const cur = v[active] ?? ""; if (k === "del") return { ...v, [active]: cur.slice(0, -1) }; if (k === ".") { if (p.kind !== "dec" || cur.includes(".") || cur === "") return v; return { ...v, [active]: cur + "." }; } if (cur.replace(".", "").length >= 4) return v; return { ...v, [active]: cur + k }; }); };
  const judge = () => {
    if (lockRef.current) return;
    if (isBlank(p, vals)) { const nb = blankRef.current + 1; blankRef.current = nb; if (nb < 3) { setHint(nb === 1 ? "답을 입력해 볼까요?" : `답을 적어볼까요? (${nb}/3)`); return; } } else blankRef.current = 0;
    setHint(null);
    const skipped = blankRef.current >= 3; blankRef.current = 0;
    let ok = false;
    if (!skipped) {
      if (p.kind === "frac") { const n = parseInt(vals.n, 10), d = parseInt(vals.d, 10); if (Number.isFinite(n) && Number.isFinite(d) && d !== 0) { const r = reduce(n, d); ok = r.n === p.ans.n && r.d === p.ans.d; } }
      else if (p.kind === "mixed") { const w = vals.w === "" ? 0 : parseInt(vals.w, 10), n = parseInt(vals.n, 10), d = parseInt(vals.d, 10); if (Number.isFinite(w) && Number.isFinite(n) && Number.isFinite(d) && d !== 0) { const r = reduce(w * d + n, d); ok = r.n === p.ans.n && r.d === p.ans.d; } }
      else if (p.kind === "qr") ok = parseInt(vals.q, 10) === p.ans.q && parseInt(vals.r, 10) === p.ans.r;
      else if (p.kind === "dec") ok = Math.abs(parseFloat(vals.a) - p.ans) < 1e-9;
      else ok = parseInt(vals.a, 10) === p.ans;
    }
    const sec = (Date.now() - probRef.current) / 1000;
    const tier = ok ? speedTier(sec) : null;
    if (ok) { setSpeedXP((x) => x + SPEED[tier].xp); setFlash(tier); }
    const nm = [...marks, ok]; setMarks(nm); const ns = [...speeds, tier]; setSpeeds(ns);
    setFeedback(ok ? "ok" : "no"); lockRef.current = true;
    setTimeout(() => { lockRef.current = false; setFeedback(null); setFlash(null);
      if (idx + 1 >= ROUND) { clearInterval(tRef.current); const correct = nm.filter(Boolean).length; const fast = ns.filter((t) => t === "reflex" || t === "auto").length; onDone({ correct, total: ROUND, perfect: correct === ROUND, seconds: Math.round((Date.now() - startRef.current) / 1000), marks: nm, speedXP: speedXP + (ok ? SPEED[tier].xp : 0), autoRate: Math.round(fast / ROUND * 100) }); }
      else setIdx(idx + 1);
    }, ok ? 480 : 1100);
  };
  const ansText = () => { if (p.kind === "frac") return `${p.ans.n}/${p.ans.d}`; if (p.kind === "qr") return `몫 ${p.ans.q}·나머지 ${p.ans.r}`; if (p.kind === "mixed") { const w = Math.floor(p.ans.n / p.ans.d), r = p.ans.n % p.ans.d; return r === 0 ? `${w}` : (w > 0 ? `${w}과 ${r}/${p.ans.d}` : `${r}/${p.ans.d}`); } return String(p.ans); };
  const keypad = ["1", "2", "3", "4", "5", "6", "7", "8", "9", p.kind === "dec" ? "." : "", "0", "del"];
  return (
    <>
      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}`}</style>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
        <button onClick={onExit} style={{ background: "none", border: "none", color: C.sub, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>‹ 그만</button>
        <div style={{ fontSize: 13.5, fontWeight: 800 }}>{stage.name}</div>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <span style={{ fontSize: 14, fontWeight: 800, color: C.gold, fontVariantNumeric: "tabular-nums" }}>⚡{speedXP}</span>
          <span style={{ fontSize: 14, fontWeight: 800, color: C.sub, fontVariantNumeric: "tabular-nums" }}>{fmtTime(elapsed)}</span>
        </div>
      </div>
      <div style={{ display: "flex", gap: 5, marginBottom: 18 }}>{Array.from({ length: ROUND }).map((_, i) => <span key={i} style={{ flex: 1, height: 6, borderRadius: 4, background: i < idx ? (marks[i] ? (SPEED[speeds[i]] ? SPEED[speeds[i]].c : C.ok) : C.no) : i === idx ? C.brand : C.line }} />)}</div>
      <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 22, padding: "30px 16px 26px", textAlign: "center", marginBottom: 14, animation: feedback === "no" ? "shake .4s" : "none", boxShadow: feedback === "ok" ? `0 0 0 3px ${flash ? SPEED[flash].c : C.ok}` : feedback === "no" ? `0 0 0 3px ${C.no}` : "0 2px 14px rgba(0,0,0,.03)" }}>
        <div style={{ fontSize: 12, fontWeight: 800, color: C.sub, marginBottom: 14 }}>{idx + 1} / {ROUND}</div>
        <Question tokens={p.tokens} />
        <div style={{ marginTop: 20 }}><AnswerInput p={p} vals={vals} active={active} setActive={setActive} feedback={feedback} /></div>
        {feedback === "ok" && flash && <div style={{ marginTop: 12, fontSize: 15, fontWeight: 900, color: SPEED[flash].c, animation: "pop .3s" }}>{SPEED[flash].emoji} {SPEED[flash].name} +{SPEED[flash].xp}</div>}
        {feedback === "no" && <div style={{ marginTop: 12, fontSize: 14, fontWeight: 800, color: C.no }}>정답 {ansText()}</div>}
        {hint && !feedback && <div style={{ marginTop: 12, fontSize: 14, fontWeight: 800, color: C.gold }}>{hint}</div>}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginBottom: 10 }}>
        {keypad.map((k, i) => k === "" ? <span key={i} /> : <button key={i} onClick={() => press(k)} style={{ padding: "15px 0", fontSize: 21, fontWeight: 800, borderRadius: 14, cursor: "pointer", color: k === "del" ? C.no : C.ink, background: C.key, border: `1px solid ${C.keyLine}`, fontVariantNumeric: "tabular-nums" }}>{k === "del" ? "⌫" : k}</button>)}
      </div>
      <button onClick={judge} style={{ width: "100%", padding: "15px 0", fontSize: 17, fontWeight: 800, borderRadius: 15, cursor: "pointer", color: "#fff", background: C.brand, border: "none" }}>확인</button>
    </>
  );
}
function AnswerInput({ p, vals, active, setActive, feedback }) {
  const box = (key, ph) => { const on = active === key; return (<button onClick={() => setActive(key)} style={{ minWidth: 68, padding: "9px 14px", fontSize: 25, fontWeight: 800, borderRadius: 12, background: feedback === "ok" ? C.okSoft : feedback === "no" ? C.noSoft : "#fff", border: `2px solid ${on ? C.brand : C.line}`, color: C.ink, cursor: "pointer", fontVariantNumeric: "tabular-nums" }}>{vals[key] !== "" && vals[key] != null ? vals[key] : <span style={{ color: C.line }}>{ph}</span>}{on && <span style={{ color: C.brand }}>|</span>}</button>); };
  if (p.kind === "frac") return <div style={{ display: "inline-flex", flexDirection: "column", alignItems: "center", gap: 6 }}>{box("n", "분자")}<span style={{ width: 84, height: 3, background: C.ink, borderRadius: 2 }} />{box("d", "분모")}</div>;
  if (p.kind === "mixed") return <div style={{ display: "inline-flex", alignItems: "center", gap: 12 }}>{box("w", "정수")}<span style={{ display: "inline-flex", flexDirection: "column", alignItems: "center", gap: 6 }}>{box("n", "분자")}<span style={{ width: 72, height: 3, background: C.ink, borderRadius: 2 }} />{box("d", "분모")}</span></div>;
  if (p.kind === "qr") return <div style={{ display: "inline-flex", alignItems: "center", gap: 12 }}><span style={{ display: "inline-flex", flexDirection: "column", alignItems: "center", gap: 4 }}><span style={{ fontSize: 12, fontWeight: 800, color: C.sub }}>몫</span>{box("q", "?")}</span><span style={{ display: "inline-flex", flexDirection: "column", alignItems: "center", gap: 4 }}><span style={{ fontSize: 12, fontWeight: 800, color: C.sub }}>나머지</span>{box("r", "?")}</span></div>;
  return box("a", "답");
}

/* ─────────── 내 학습판 (백엔드) ─────────── */
function MeScreen({ no }) {
  const [d, setD] = useState(undefined); // undefined=로딩, null=실패
  useEffect(() => { (async () => { if (!api.on()) { setD(null); return; } try { setD(await api.getDashboard(no)); } catch (e) { setD(null); } })(); }, [no]);
  if (d === undefined) return <Loading />;
  if (!d) return <Note kind="warn">대시보드를 보려면 백엔드 연결이 필요합니다. 학습은 정상 동작하며 기록은 저장돼 있다가 연결되면 반영됩니다.</Note>;
  const lv = d.level || { idx: 0, name: "첫걸음", cur: 0, next: 300, isMax: false };
  const toNext = lv.isMax ? 0 : lv.next - d.points, lvPct = lv.isMax ? 100 : Math.round((d.points - lv.cur) / (lv.next - lv.cur) * 100);
  const cr = crest(d.title);
  return (
    <>
      <div style={{ background: cr.bg, borderRadius: 20, padding: 20, color: "#fff", marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
          <div>
            <div style={{ fontSize: 12.5, fontWeight: 700, opacity: .9 }}>이번 주 계급</div>
            <div style={{ fontSize: 34, fontWeight: 900, display: "flex", alignItems: "center", gap: 8 }}>{cr.crown && <Crown s={28} />}{d.title}</div>
            <div style={{ fontSize: 13, fontWeight: 700, opacity: .92, marginTop: 2 }}>{d.tier} · 반 {d.pos + 1}위 / {d.classSize}명</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 12.5, fontWeight: 700, opacity: .9 }}>이번 주 성장</div>
            <div style={{ fontSize: 30, fontWeight: 900, fontVariantNumeric: "tabular-nums" }}>{km(d.weekly)}P</div>
            <div style={{ fontSize: 12, fontWeight: 700, opacity: .9 }}>연속 {d.streak}일</div>
          </div>
        </div>
        <div style={{ marginTop: 14, padding: "9px 12px", background: "rgba(255,255,255,.16)", borderRadius: 11, fontSize: 12, fontWeight: 700, lineHeight: 1.5 }}>
          계급은 <b>매주 월요일</b> 이번 주 성장 포인트로 새로 정해져요. 다음 주엔 누구나 다시 도전!
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(260px,1fr))", gap: 14 }}>
        <Card title="나의 성장 (누적)" accent={C.gold}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
            <span style={{ fontSize: 18, fontWeight: 900, color: C.brandDk }}>Lv.{lv.idx + 1} {lv.name}</span>
            <span style={{ fontSize: 14, fontWeight: 800, color: C.goldDk }}>{km(d.points)}P</span></div>
          <div style={{ height: 9, background: C.track, borderRadius: 6 }}><div style={{ width: `${lvPct}%`, height: "100%", background: C.gold, borderRadius: 6 }} /></div>
          <div style={{ marginTop: 6, fontSize: 12, color: C.sub, fontWeight: 700 }}>{lv.isMax ? "최고 레벨!" : `다음 레벨까지 ${km(toNext)}P`}</div>
        </Card>
        <Card title="최근 학습" accent={C.blue}>
          {(!d.recent || !d.recent.length) ? <div style={{ fontSize: 13, color: C.sub, fontWeight: 600, padding: "8px 2px" }}>아직 기록이 없어요. [학습] 탭에서 한 세트 풀어보세요!</div>
            : d.recent.slice(0, 4).map((l, i) => (<div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 2px", borderTop: i ? `1px solid ${C.line}` : "none" }}><span style={{ fontSize: 13.5, fontWeight: 600 }}>{l.stageName} · {l.correct}/{l.total}{l.perfect ? " 완전통과!" : ""}</span><span style={{ fontSize: 14, fontWeight: 900, color: C.goldDk }}>+{l.points}P</span></div>))}
        </Card>
        <Card title="성실도 · 최근 30일" accent={C.brand}>
          <div style={{ display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
            <Donut pct={d.dilig} color={C.brand} label={`${d.dilig}%`} sub="성실도" />
            <div style={{ flex: 1, minWidth: 130 }}><Row head cells={["기준", "일수", ""]} /><Row cells={["학습 완료", `${d.c30}일`, ""]} /><Row cells={["미학습", `${30 - d.c30}일`, ""]} /></div></div>
        </Card>
        <Card title="학습 진행률" accent={C.no}>
          <div style={{ display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
            <Donut pct={d.perfectRate} color={C.ok} label={`${d.perfectRate}%`} sub="완전통과율" />
            <div style={{ flex: 1, minWidth: 130 }}><Row head cells={["", "누적", ""]} /><Row cells={["완전통과", `${d.perfectSets}세트`, ""]} /><Row cells={["총 세트", `${d.sets}세트`, ""]} /><Row cells={["정확도", `${d.accuracy}%`, ""]} accent={C.ok} /></div></div>
        </Card>
      </div>
    </>
  );
}

/* ─────────── 우리 반 (백엔드) ─────────── */
function ClassScreen({ meNo }) {
  const [d, setD] = useState(undefined);
  useEffect(() => { (async () => { if (!api.on()) { setD(null); return; } try { setD(await api.getClass()); } catch (e) { setD(null); } })(); }, []);
  if (d === undefined) return <Loading />;
  if (!d) return <Note kind="warn">반 순위를 보려면 백엔드 연결이 필요합니다. (배포 가이드 4단계 참고)</Note>;
  const s = d.summary, list = d.students || [];
  return (
    <>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(150px,1fr))", gap: 12, marginBottom: 14 }}>
        <Summary v={s.dalmuti} l="이번 주 달무티" c={C.goldDk} />
        <Summary v={`${km(s.weeklyTotal)}P`} l="반 이번 주 성장 합계" c={C.brand} />
        <Summary v={`${s.studiedToday}/${s.count}`} l="오늘 학습한 학생" c={C.blue} />
      </div>
      <Card title="이번 주 성장 랭킹 · 달무티 계급" accent={C.gold}>
        <div style={{ fontSize: 12.5, color: C.sub, fontWeight: 700, marginBottom: 10, lineHeight: 1.5 }}>누적이 아니라 <b style={{ color: C.brandDk }}>이번 주에 얼마나 성장했는가</b>로 줄을 세웁니다. 매주 월요일 계급이 새로 정해져요.</div>
        <div style={{ overflowX: "auto" }}><div style={{ minWidth: 480 }}>
          <div style={{ display: "grid", gridTemplateColumns: "40px 1.3fr 1fr 1.1fr 0.8fr", padding: "8px 8px", background: C.brandSoft, borderRadius: 9, fontSize: 12, fontWeight: 800, color: C.brandDk }}>
            <span>순위</span><span>학생</span><span style={{ textAlign: "right" }}>이번 주 성장</span><span style={{ textAlign: "center" }}>계급</span><span style={{ textAlign: "right" }}>정확도</span></div>
          {list.map((b) => { const mine = b.no === meNo; return (
            <div key={b.no} style={{ display: "grid", gridTemplateColumns: "40px 1.3fr 1fr 1.1fr 0.8fr", alignItems: "center", padding: "10px 8px", borderTop: `1px solid ${C.line}`, background: mine ? C.goldSoft : "transparent", borderRadius: mine ? 9 : 0, fontVariantNumeric: "tabular-nums" }}>
              <span style={{ fontWeight: 900, color: b.pos < 3 ? C.goldDk : C.sub, fontSize: 14 }}>{b.pos + 1}</span>
              <span style={{ fontWeight: mine ? 900 : 700, color: C.ink, fontSize: 13.5 }}>{b.no}번 {b.name}{mine ? " (나)" : ""}</span>
              <span style={{ textAlign: "right", fontWeight: 900, color: C.goldDk, fontSize: 14 }}>{km(b.weekly)}P</span>
              <span style={{ textAlign: "center" }}><Badge title={b.title} /></span>
              <span style={{ textAlign: "right", fontWeight: 800, color: C.ok, fontSize: 13.5 }}>{b.accuracy}%</span>
            </div>); })}
        </div></div>
      </Card>
    </>
  );
}

function Summary({ v, l, c }) { return <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 16, padding: "15px 12px", textAlign: "center" }}><div style={{ fontSize: 22, fontWeight: 900, color: c, fontVariantNumeric: "tabular-nums" }}>{v}</div><div style={{ fontSize: 12, color: C.sub, fontWeight: 700, marginTop: 3 }}>{l}</div></div>; }
function Loading() { return <div style={{ padding: "40px 0", textAlign: "center", color: C.sub, fontWeight: 700, fontSize: 14 }}>불러오는 중…</div>; }

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
